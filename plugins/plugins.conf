
# vi: filetype=tmux

# ==============================================================================
# ENVIRONMENT
# ==============================================================================
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'


# ==============================================================================
# PLUGINS
# ==============================================================================

# --- tmux fuzzback ---
# TODO: Test tmux fuzzback
# https://github.com/roosta/tmux-fuzzback

# --- tmux-picker ---
run-shell ~/.tmux/plugins/tmux-picker/tmux-picker.tmux

# --- tmux-prefixless ---
run-shell ~/.tmux/plugins/tmux-prefixless/prefixless.tmux

# --- tmux-scratchpad ---
run-shell ~/.tmux/plugins/tmux-scratchpad/scratchpad.tmux
bind-key -n M-m run-shell -b $HOME/.tmux/plugins/tmux-scratchpad/scripts/scratch_cmd.bash

# --- tmux-chameleon ---
run-shell ~/.tmux/plugins/tmux-chameleon/chameleon.tmux

